version: '3.9'

services:
  app:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      target: runner
    image: nextjs-app:latest
    container_name: nextjs-app
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
    env_file:
      - .env
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
